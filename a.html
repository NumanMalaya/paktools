<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ball String Physics System</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial, sans-serif;
  }
  .ui {
    position: absolute;
    top: 15px;
  }
  input {
    width: 60px;
  }
</style>
</head>
<body>

<div class="ui">
  Balls:
  <input type="number" id="ballCount" min="1" max="20" value="3">
</div>

<canvas id="canvas" width="440" height="440"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const cx = canvas.width / 2;
const cy = canvas.height / 2;
const R = 150;

const colors = ["#ff2d2d", "#a855f7", "#ffffff", "#22c55e", "#38bdf8"];
let balls = [];

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

function createBalls(n) {
  balls = [];
  for (let i = 0; i < n; i++) {
    balls.push({
      x: cx + rand(-60, 60),
      y: cy + rand(-60, 60),
      vx: rand(-2, 2),
      vy: rand(-2, 2),
      r: 10,
      color: colors[i % colors.length],
      anchors: [],
      hadLine: false
    });
  }
}

// Distance from point to line segment
function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const l2 = dx * dx + dy * dy;
  if (l2 === 0) return Math.hypot(px - x1, py - y1);
  let t = ((px - x1) * dx + (py - y1) * dy) / l2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
}

document.getElementById("ballCount").addEventListener("change", e => {
  createBalls(+e.target.value);
});

// Ball–Ball collision
function resolveBallCollisions() {
  for (let i = 0; i < balls.length; i++) {
    for (let j = i + 1; j < balls.length; j++) {
      const a = balls[i];
      const b = balls[j];

      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const minDist = a.r + b.r;

      if (dist < minDist && dist !== 0) {
        const nx = dx / dist;
        const ny = dy / dist;

        // Push apart
        const overlap = minDist - dist;
        a.x -= nx * overlap / 2;
        a.y -= ny * overlap / 2;
        b.x += nx * overlap / 2;
        b.y += ny * overlap / 2;

        // Velocity swap along normal
        const dvx = b.vx - a.vx;
        const dvy = b.vy - a.vy;
        const impulse = dvx * nx + dvy * ny;

        if (impulse < 0) {
          a.vx += impulse * nx;
          a.vy += impulse * ny;
          b.vx -= impulse * nx;
          b.vy -= impulse * ny;
        }
      }
    }
  }
}

function drawCircle() {
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = "#666";
  ctx.lineWidth = 2;
  ctx.stroke();
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.clip();

  // Move balls
  balls.forEach(b => {
    b.x += b.vx;
    b.y += b.vy;

    const dx = b.x - cx;
    const dy = b.y - cy;
    const dist = Math.hypot(dx, dy);

    // Border collision
    if (dist + b.r >= R) {
      const nx = dx / dist;
      const ny = dy / dist;

      b.x = cx + nx * (R - b.r);
      b.y = cy + ny * (R - b.r);

      const dot = b.vx * nx + b.vy * ny;
      b.vx -= 2 * dot * nx;
      b.vy -= 2 * dot * ny;

      b.anchors.push({
        x: cx + nx * R,
        y: cy + ny * R
      });

      b.hadLine = true;
    }
  });

  // Ball ↔ Ball bounce
  resolveBallCollisions();

  // Line deletion by crossing
  balls.forEach(b => {
    b.anchors = b.anchors.filter(a =>
      !balls.some(other => {
        if (other === b) return false;
        return pointToSegmentDistance(
          other.x, other.y,
          b.x, b.y,
          a.x, a.y
        ) <= other.r;
      })
    );
  });

  // Delete balls only if they lost all lines
  balls = balls.filter(b => !b.hadLine || b.anchors.length > 0);

  // Draw
  balls.forEach(b => {
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 1;
    b.anchors.forEach(a => {
      ctx.beginPath();
      ctx.moveTo(b.x, b.y);
      ctx.lineTo(a.x, a.y);
      ctx.stroke();
    });

    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();
  drawCircle();
  requestAnimationFrame(animate);
}

createBalls(3);
animate();
</script>

</body>
</html>
