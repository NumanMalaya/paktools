<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - ToolNish</title>

<!-- Header/Footer CSS -->
<link rel="stylesheet" href="res/header-footer.css">
<script src="res/header-footer.js" defer></script>

<!-- Tool-specific CSS inside <style> -->
<style>
/* Centered main content */
.main-content{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
  width:100%;
}

.container{
  max-width:700px;
  width:100%;
  background:var(--card);
  padding:30px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,.08);
}
h2{color:var(--primary);margin-bottom:20px;text-align:center;}
p{line-height:1.7;margin-bottom:15px;}
input,textarea{
  width:100%;
  margin-bottom:15px;
  padding:12px;
  border-radius:8px;
  border:1px solid #ddd;
}
.submit{
  background:var(--primary);
  color:white;
  padding:12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:.3s;
}
button:hover{opacity:.9;}
</style>
</head>
<body>

<div class="main-content">
  <div class="container">
    <h2>Contact Us</h2>
    <p>Have questions or suggestions? Feel free to reach out!</p>
    <form onsubmit="event.preventDefault(); alert('Message submitted!');">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" rows="6" required></textarea>
      <button type="submit" class="submit">Send Message</button>
    </form>
  </div>
</div>

</body>

</html>
